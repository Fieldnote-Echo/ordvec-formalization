name = "OrdvecFormalization"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["OrdvecFormalization"]
lintDriver = "batteries/runLinter"

[leanOptions]
pp.unicode.fun = true
relaxedAutoImplicit = false
autoImplicit = false
maxHeartbeats = 400000
weak.linter.mathlibStandardSet = true
weak.linter.style.longLine = true
weak.linter.style.lambdaSyntax = true
weak.linter.style.dollarSyntax = true
weak.linter.style.cdot = true
weak.linter.style.missingEnd = true

# Pinned to the same Lean/Mathlib as `takens-formalization` (the base project),
# so shared lemmas can be ported across without a toolchain bump.
[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.28.0"

[[lean_lib]]
name = "OrdvecFormalization"
